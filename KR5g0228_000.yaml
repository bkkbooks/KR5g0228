body:
  text: 玄斗元精三素朗明群精啓道掃除不祥八威召命攝戮邪精延年無窮受者長生神氣四冥製會酆山束送六天敢有稽延伏匿凶醜八方威神盡歸我真急急如律令七真曰若世間有道士知我神圖者可與百神同遊步綱駕紀攝召萬靈得道尅復道真永離酆都鬼官矣七真綱符九道步綱道場北面遷綱上千金留藏不傳非輩通光素女神章能召百魔侍衛道士佩帶太元陰生玉女神章道士佩之長生久視知鬼神廣靈玉女神章道士服之與天地相畢寶生素女神章道士佩者萬靈朝禮舉行三界太和玉女神章道士服之周行五嶽萬神禮庭七真曰我昔見此圖之時魔宫振動山嶽吞煙日月朗明於三界群魔東首神兵秉鉞六齒揚鞭奔星下垂於三界列玄祕券於星璣後學真人依科明建大法周運五湖七澤七廟二十四嶽若有道士佩之者以絳囊盛之於靜室遇賢者三十年一傳勿傳非其人不得其人毁敗真道禍考其身慎口勿言閉守其行行按不犯立見真道剋名瓊宫之中矣七真曰後學道士或居人間或居朝市或居山谷修習真訣遊行教化見疾為醫方便救濟一切衆生一心當發慈悲廣行道氣我當助子七真曰若是道士遊行國界遇陽九百六灾否可依吾科令建立七元燈象行道念咒表奏章詞請滅灾禍延年無窮後得道時可與此圖象周行三界升入金門也七真曰三界之中若有道士宿命合道乃見此圖當一心奉行如對御前奉宣門下具列上象真圖如左七元召魔伏六天神咒經
  hash: sha256:bf6d40278647d4280c0c3abc88df96f2ca1d8859c308e9edfb2f23e8df9d2169
