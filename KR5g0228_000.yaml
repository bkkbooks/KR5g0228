front:
  text: 七元召魔伏六天神咒經群三爾時道君告三十六天神王五氣天君壙野大神五湖大將軍衛靈大神飛龍直騎三五之君五老上帝元王天真我昔為一切衆生說此經時魔宫振動大地鬼神悉皆伏聽各聞勑令放汝罪譴各還一心咸生善念自今已去若有道士救人之處我當為助驅馳殺鬼治病佐天正氣消滅衆精召請立至矣七真召天真伏魔品道言我昔為諸天人驅邪去害滅惡除凶若三龍之後有道士能於此法中行是功德有灾之方當為大建北斗七元壇燃燈行道召三五之君一氣之神明威滅邪斬鬼神兵馬一切衆生消災度厄延年無窮靈官天尊召北方大魔王敕一切神鬼自今已去當助道士作法殺鬼戮凶生人獲泰七真命召五雷神兵伏魔品七真曰我昔為衆生說神咒妙經滅罪除凶鎮精邪佐天助化若有道士一心目專一法建立道場燃燈行道符章壓鎮追捉鬼神我當為召請五雷神兵億億萬騎來降道場消滅精魅揮割蟲毒疫精我當召請來到御前奉請東方大雲雷火鈴神兵木精吏兵九億萬騎部領角亢之精步九氣之雲輪刀仗劔來降道場誅伐劉元達疫氣鬼兵行其青病急收毒氣以生人民助道行化急急如律令奉請南方大雲雷火鈴神兵炎精吏兵三億萬騎部領井鬼之精步三氣之雲輪刀仗劔來降道場誅斬張元伯疫氣鬼兵行其赤毒疫病急收毒氣以生人民助道行化急急如律令奉請西方大雲雷火鈴神兵七億萬騎金精大神部領奎婁强兵步七氣之雲輪刀仗劔來降道場收攝五方妖魅趙公明殟毒疫鬼急去千里收殟攝毒以生人民助道政化急急如律令奉請北方大雲雷火鈴神兵五億萬騎水精大神部領斗牛神兵步五氣之雲翻天轉地來降道場收斬鐘士季疫毒之鬼急去萬里悉皆伏滅急急如律令奉請中央大雲雷火鈴神兵一十二萬騎土皇神符部領四方强兵步黃氣之雲輪刀仗劔來降道場收斬史文業殟毒疫鬼速出千里生民安泰國土清平急急如律令七真曰是此五天各有神兵億萬啓建道場威光立備若有疾病之人但燃七元燈存想吐納想見本師從所在之方來為禁伏一切狂邪妖魅不祥之氣皆自成血先叩齒七通念天蓬咒一百二十遍陰密存念七元真氣驅馳百毒消灾降福具告五方雲雷大符如左第一元神符鎮艮宫桃木板長一尺九寸篆之第二元神符鎮巽宫梓木板長一尺三寸第三元神符鎮坎宫桐木板可長二尺第四元神符鎮兌宫銀木板可長一尺五寸第五元神符鎮坤宫桃木板長二尺第六元神符鎮乾宫白楊木板長三尺第七元神符鎮離宫桃木板長一尺三寸第八元神符鎮震宫白楊木板長一尺七寸第九元神符鎮中宫總攝三萬六千神氣桃木板長二尺七真曰此符出乎酆都山真人得道皆召用五方雲雷虎賁星辰召請皆用此符攝五方鬼神役使天兵悉興雲動雨禁戒惡魔此符藏八天雲崖和天靜地若有道士學道求仙之人可齎命帛質信金資而傳不得妄受福考生人過去惡道若有道士有本可依科祭醮夜露星辰傳之有本為師宗傳請者為弟子依科修奉醮祭求福當用銀板五片朱書鎮有病之家惡鬼殄潰萬魅逃蹤天帝告符召攝精崇千日修行皆置神人天人仙人皇人羽人真人靈人聖人靈瑞陰助道士見文祕藏勿傳非其人靈符五道皆有百萬神兵飛天鬼衆侍衛此符受師重法如對御前七真召攝六洞諸魔品七真曰我為諸天說神真護身五雲神符飛步七元躡元精九氣上皇高真元始三夭真券在酆都鎮其山之陽有九氣覆之若有道士後世之中若有見聞此符當以本命日白素四十尺五果香油質信與師為誓醮祭我七元上皇九真當受之錦囊盛之祕藏靜室之中立其高座旦夕朝太上北極尊神謁太微帝君後得五氣通身束繫衆魔萬靈朝迎三官所舉地祇奉侍群魔振伏莫敢違逆乃為咒曰
